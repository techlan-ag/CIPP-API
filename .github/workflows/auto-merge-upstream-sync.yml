name: Auto-merge upstream sync PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for pull[bot] sync PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            if [ "${{ github.event.pull_request.user.login }}" = "pull[bot]" ]; then
              gh pr merge "${{ github.event.pull_request.number }}" --repo "$REPO" --auto --merge
            fi
          else
            for pr in $(gh pr list --repo "$REPO" --author "app/pull" --state open --json number --jq '.[].number'); do
              gh pr merge "$pr" --repo "$REPO" --auto --merge || true
            done
          fi
